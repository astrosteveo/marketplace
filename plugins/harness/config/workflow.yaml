# Workflow Configuration
# ======================
#
# Default configuration for the /harness:feature workflow.
# Users can override at two levels:
#
#   1. Project-level:  .claude/harness.yaml
#   2. User global:    ~/.claude/harness.yaml
#
# Resolution order: User global -> Project -> Plugin defaults

# ------------------------------------------------------------------------------
# PHASE WORKFLOW
# ------------------------------------------------------------------------------

phases:
  # Phases to skip entirely
  # Valid: discovery, explore, requirements, design, implement, review, testing, summary
  skip: []

  # Replace a phase with an alternative skill
  # Example: Always use TDD
  # replace:
  #   implement: red-green-refactor
  replace: {}

# ------------------------------------------------------------------------------
# TDD (RED-GREEN-REFACTOR)
# ------------------------------------------------------------------------------

tdd:
  # Mode: recommend | always | never
  mode: recommend

  # Auto-suggest TDD for these feature types
  recommend-for:
    - algorithms
    - business-rules
    - data-transformations
    - validation-logic
    - state-machines
    - pure-functions

# ------------------------------------------------------------------------------
# ARTIFACTS
# ------------------------------------------------------------------------------

artifacts:
  # Directory for feature artifacts (relative to project root)
  directory: .artifacts

  git:
    auto-commit: true
    commit-style: conventional # conventional | simple

# ------------------------------------------------------------------------------
# AGENTS
# ------------------------------------------------------------------------------

agents:
  # Number of parallel agents for explore/design/review phases
  parallel-count: 3

  # Model per agent type
  models:
    explorer: opus
    architect: opus
    reviewer: opus

# ------------------------------------------------------------------------------
# CODE REVIEW
# ------------------------------------------------------------------------------

review:
  # Only report issues with confidence >= threshold (0-100)
  confidence-threshold: 80

  focus:
    - bugs
    - security
    - conventions
    # - performance
    # - accessibility
    # - documentation

# ------------------------------------------------------------------------------
# MEMORY (ENGRAM INTEGRATION)
# ------------------------------------------------------------------------------

memory:
  # Search project memory at workflow start
  search-on-start: true

  # Remember key decisions at workflow end
  remember-on-complete: true

  # Sync session to memory index at workflow end
  sync-on-complete: true

# ------------------------------------------------------------------------------
# PROJECT CONTEXT
# ------------------------------------------------------------------------------

project:
  # Project type: web-app, api, cli, library, game, mobile-app, desktop-app
  type: null

  # Primary framework: react, vue, express, django, rails, etc.
  framework: null

  # Test framework: vitest, jest, pytest, rspec, etc.
  test-framework: null

  # Files to always read for context during discovery
  context-files: []
  # Example:
  # context-files:
  #   - README.md
  #   - ARCHITECTURE.md
